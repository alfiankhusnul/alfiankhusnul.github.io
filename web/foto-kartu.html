<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID Photo Pro</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --accent: #ffffff;
            --border: #333;
        }

        body {
            margin: 0; padding: 20px;
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--accent);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; text-align: center; }

        h2 { font-size: 1rem; font-weight: 400; color: #888; margin-bottom: 20px; }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Frame Masking */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .guide-box {
            width: 300px; height: 200px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.6); /* Area gelap diluar frame */
            border-radius: 2px;
        }

        .controls { width: 100%; margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }

        button {
            padding: 16px; border-radius: 12px; border: none;
            font-weight: 600; font-size: 14px; cursor: pointer;
        }

        #captureBtn { background: var(--accent); color: #000; }
        #downloadBtn { background: transparent; color: #fff; border: 1px solid var(--border); display: none; }

        .preview-box {
            margin-top: 25px; display: none;
            padding: 15px; background: var(--surface); border-radius: 12px;
        }

        #previewImg { width: 100%; max-width: 300px; height: auto; border: 1px solid #444; border-radius: 4px; }
        
        .status-text { font-size: 12px; margin-top: 10px; color: #00ff88; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>FOTO KARTU IDENTITAS</h2>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="overlay">
            <div class="guide-box"></div>
        </div>
    </div>

    <div class="controls">
        <button id="captureBtn">AMBIL FOTO</button>
        <a id="downloadLink" style="text-decoration: none;">
            <button id="downloadBtn">SIMPAN KE HP</button>
        </a>
    </div>

    <div class="preview-box" id="previewBox">
        <p style="font-size: 12px; color: #777;">HASIL KOMPRESI:</p>
        <img id="previewImg">
        <div id="fileInfo" class="status-text"></div>
    </div>
</div>

<canvas id="internalCanvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('internalCanvas');
    const captureBtn = document.getElementById('captureBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const downloadLink = document.getElementById('downloadLink');
    const previewImg = document.getElementById('previewImg');
    const previewBox = document.getElementById('previewBox');
    const fileInfo = document.getElementById('fileInfo');

    // Gunakan resolusi 900x600 (3x dari 300x200) untuk ketajaman tinggi tanpa file kegedean
    const FINAL_W = 900;
    const FINAL_H = 600;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
        } catch (e) { alert("Izin kamera diperlukan."); }
    }

    captureBtn.addEventListener('click', () => {
        const ctx = canvas.getContext('2d');
        canvas.width = FINAL_W;
        canvas.height = FINAL_H;

        // Mendapatkan ukuran asli video stream
        const vW = video.videoWidth;
        const vH = video.videoHeight;

        // Hitung rasio tampilan video di layar vs resolusi asli
        // Kita ingin mengambil area yang tertutup oleh .guide-box (300x200)
        const displayW = video.offsetWidth;
        const displayH = video.offsetHeight;
        
        // Rasio perbandingan (Berapa banyak pixel asli per 1 pixel layar)
        const scale = vW / displayW;

        // Dimensi pemotongan (crop) di video asli
        const cropW = 300 * scale;
        const cropH = 200 * scale;
        const startX = (vW - cropW) / 2;
        const startY = (vH - cropH) / 2;

        // Gambar ke canvas resolusi tinggi
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, FINAL_W, FINAL_H);

        // Fungsi Kompresi Cerdas (Smart Compression Loop)
        let quality = 0.92;
        let dataUrl = "";
        let sizeKB = 0;

        // Loop hingga ukuran di bawah 200KB
        do {
            dataUrl = canvas.toDataURL('image/jpeg', quality);
            const stringLength = dataUrl.split(',')[1].length;
            sizeKB = (stringLength * 3 / 4) / 1024;
            quality -= 0.05; // Turunkan kualitas jika masih kegedean
        } while (sizeKB > 195 && quality > 0.1);

        // Update UI
        previewImg.src = dataUrl;
        previewBox.style.display = 'block';
        downloadBtn.style.display = 'block';
        downloadLink.href = dataUrl;
        downloadLink.download = `ID_PHOTO_${Math.floor(Date.now()/1000)}.jpg`;
        fileInfo.innerText = `Selesai: ${sizeKB.toFixed(1)} KB (High Quality)`;
        
        // Scroll ke preview
        previewBox.scrollIntoView({ behavior: 'smooth' });
    });

    startCamera();
</script>

</body>
</html>
